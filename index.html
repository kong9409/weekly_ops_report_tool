le></head><body><div class="page"><section class="hero"><h1>运营周报生成工具（原因选项库版 v2）</h1><p>修复原因选择不显示、不能运行的问题；新增关键动作分类/原因维度下拉框。只上传绩效表，本月目标和本周完成进度手动输入，其余从《运营项目周报》原因库勾选。</p></section><section class="card"><h2>1. 上传绩效表</h2><input type="file" id="file" accept=".xlsx,.xls"><p class="small">上传后自动读取“每日数据”或第一个工作表，汇总销售额、销量、毛利率、TACOS、访客、转化率、广告CTR、广告转化率。</p><div id="status" class="small"></div><div id="summary" class="three"></div></section><section class="two"><div class="card"><h2>2. 手动输入</h2><label>本月目标</label><textarea id="target" rows="6" placeholder="本月GMV/利润率/TACOS/重点产品目标……"></textarea><label>本周完成进度</label><textarea id="progress" rows="9" placeholder="本周销售额、销量、利润率、产品推进情况……"></textarea></div><div class="card"><h2>3. 选择本周主要指标波动</h2><button class="ghost" onclick="addManualMetric()">手动新增指标波动</button><div id="metrics" class="hint small">上传绩效表后自动生成异常指标，也可以手动新增。</div></div></section><section class="card"><h2>4. 勾选原因、关键动作、下周计划</h2><div class="filters"><div><label>关键动作分类</label><select id="cat" onchange="renderBank()"><option>全部</option><option>市场</option><option>竞品</option><option>产品</option><option>广告</option><option>售后</option><option>其他</option></select></div><div><label>原因维度</label><select id="dim" onchange="renderBank()"></select></div></div><div id="bank"></div></section><section class="card"><h2>5. 生成周报</h2><button onclick="generateReport()">生成周报草稿</button><button class="secondary" onclick="downloadTxt()">下载TXT</button><button class="ghost" onclick="copyReport()">复制</button><div id="output" class="output"></div></section></div><script>const OPTION_BANK=[{"dimension": "访客", "issue": "下降", "check_methods": "1. 检查核心关键词排名的稳定性；\n2. 反查流量入口是否变动（亚马逊收录的前三页，魔词和卖家精灵查询）\n3. 检查是否因为广告转化率下降拉低了关键词排名，导致访客变少\n4. 检查是否因为涨价，整体转化率下降，销量下降，整体关键词排名下降\n5. 检查是否因为点击率下降，导致访客下降；\n6. 检查是否活动结束，活动流量入口关闭\n7. 检查是否同行加大流量抢占（广告位置竞争/同行低价活动/同行促销活动）\n8. 检查Listing时候有侵权，违规等导致整体流量降权\n9. 检查整体流量大盘情况和同行销量情况", "thinking": "增加流量入口（关键词排名/活动/同行关联/站外入口等）", "options": ["增加广告预算/增加广告投放词/投放ASIN", "降低Bid,有限预算下增加点击访客", "投放站外促销", "参加 nk()}document.addEventListener('DOMContentLoaded',init);function renderBank(){let cat=$('cat').value,dim=$('dim').value,list=OPTION_BANK.filter(o=>(cat==='全部'||(o.categories||[]).includes(cat)||(o.action_options||[]).some(a=>a.category===cat))&&(dim==='全部'||(o.dimension+' / '+o.issue)===dim));$('bank').innerHTML=list.map(o=>{let i=OPTION_BANK.indexOf(o);let actions=(o.action_options||[]).filter(a=>cat==='全部'||a.category===cat||(o.categories||[]).includes(cat));return `<div class="option"><label><input type="checkbox" class="reason" data-i="${i}">${esc(o.dimension)} / ${esc(o.issue)}</label><div class="small"><b>检查方法：</b>${esc(o.check_methods).replace(/\n/g,'<br>')}</div><div class="small"><b>执行思路：</b>${esc(o.thinking)}</div><b>关键动作 / 下周计划：</b>${actions.map(a=>`<label style="font-weight:400"><input type="checkbox" class="action" data-i="${i}" data-cat="${esc(a.category)}" data-text="${esc(a.text)}">【${esc(a.category)}】${esc(a.text)}</label>`).join('')}<label>补充说明</label><textarea class="note" data-i="${i}" rows="2" placeholder="补充具体产品、SKU、竞品、广告、库存、售后等事实"></textarea></div>`}).join('')||'<div class="hint small">暂无匹配选项，请切换下拉框。</div>'}function findHeader(rows){let best=0,score=-1;for(let r=0;r<Math.min(rows.length,12);r++){let t=rows[r].join('|');let s=['产品','SKU','销售额','销量','毛利','TACOS','访客','转化率','广告'].filter(k=>t.includes(k)).length;if(s>score){score=s;best=r}}return best}function hidx(header,names){let H=header.map(x=>String(x).replace(/[\s\n\r（）()：:%％$￥¥]/g,'').toLowerCase());for(let name of names){let n=name.replace(/[\s\n\r（）()：:%％$￥¥]/g,'').toLowerCase();let i=H.findIndex(h=>h===n||h.includes(n)||n.includes(h));if(i>=0)return i}return-1}function calc(o){o.pm=o.sales?o.profit/o.sales:0;o.tacos=o.sales?(o.spend/o.sales||o.tacos):o.tacos;o.cvr=o.sessions?(o.units/o.sessions||o.cvr):o.cvr;o.ctr=o.impr?(o.clicks/o.impr||o.ctr):o.ctr;o.adcvr=o.clicks?(o.orders/o.clicks||o.adcvr):o.adcvr;return o}$('file').addEventListener('change',async e=>{let f=e.target.files[0];if(!
